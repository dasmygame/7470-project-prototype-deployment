<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lock screen notifications demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="phone" role="application" aria-label="Lock screen notifications demo">
        <div class="screen lockScreen">
          <div class="lockWallpaper" aria-hidden="true"></div>
          <div class="lockVignette" aria-hidden="true"></div>

          <div class="lockContent">
            <div class="lockStatus" aria-hidden="true">
              <span class="pill">5G</span>
              <span class="pill">LTE</span>
              <span class="pill">BAT</span>
            </div>

            <div class="lockTimeBlock">
              <div class="lockClock" id="lockClock">9:41</div>
              <div class="lockDate" id="lockDate">Sunday, April 12</div>
            </div>

            <main class="list" id="list" aria-live="polite">
              <canvas class="notifTrail" id="notifTrail" aria-hidden="true"></canvas>
              <div class="card" data-id="email" data-type="email">
                <div class="icon">@</div>
                <div class="meta">
                  <div class="title">Email</div>
                  <div class="body">New message from Sam</div>
                  <div class="actions" aria-label="Email actions">
                    <button class="actionBtn" type="button" data-notif="email" data-action="read">Read</button>
                    <button class="actionBtn" type="button" data-notif="email" data-action="delete">Delete</button>
                  </div>
                </div>
                <div class="right">
                  <div class="cardTime">09:12</div>
                </div>
              </div>

              <div class="card" data-id="text" data-type="text">
                <div class="icon">T</div>
                <div class="meta">
                  <div class="title">Text</div>
                  <div class="body">"Running 5 minutes late"</div>
                  <div class="actions" aria-label="Text actions">
                    <button class="actionBtn" type="button" data-notif="text" data-action="read">Read</button>
                    <button class="actionBtn" type="button" data-notif="text" data-action="delete">Delete</button>
                  </div>
                </div>
                <div class="right">
                  <div class="cardTime">09:18</div>
                </div>
              </div>

              <div class="card" data-id="reminder" data-type="reminder">
                <div class="icon">!</div>
                <div class="meta">
                  <div class="title">Reminder</div>
                  <div class="body">Pay rent</div>
                  <div class="actions" aria-label="Reminder actions">
                    <button class="actionBtn" type="button" data-notif="reminder" data-action="stop">Stop</button>
                    <button class="actionBtn" type="button" data-notif="reminder" data-action="reset">Reset</button>
                  </div>
                </div>
                <div class="right">
                  <div class="cardTime">Today</div>
                </div>
              </div>

              <div class="card" data-id="alarm" data-type="alarm">
                <div class="icon">A</div>
                <div class="meta">
                  <div class="title">Alarm</div>
                  <div class="body">Wake up (demo)</div>
                  <div class="actions" aria-label="Alarm actions">
                    <button class="actionBtn" type="button" data-notif="alarm" data-action="stop">Stop</button>
                    <button class="actionBtn" type="button" data-notif="alarm" data-action="reset">Reset</button>
                  </div>
                </div>
                <div class="right">
                  <div class="cardTime">06:00</div>
                </div>
              </div>

              <div id="emptyState" class="empty hidden" aria-hidden="true">
                <div class="emptyTitle">No notifications</div>
                <div class="emptyBody">Glide over options when they return (demo).</div>
              </div>
            </main>
          </div>

          <footer class="lockFooter">
            <div
              class="unlockTrack"
              id="unlockTrack"
              role="slider"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="0"
              aria-label="Swipe to unlock"
            >
              <div class="unlockShine" aria-hidden="true"></div>
              <div class="unlockHandle" id="unlockHandle" aria-hidden="true"></div>
              <span class="unlockLabel" id="unlockLabel">Swipe to unlock</span>
            </div>
            <button class="btn secondary resetFab" id="resetBtn" type="button">Reset demo</button>
          </footer>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
